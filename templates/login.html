<!DOCTYPE html>
<html>
<head>
    <title>Login Lusa Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-box {
            background: #1f1f1f;
            padding: 40px;
            border-radius: 15px;
            margin-top: 100px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color: #007bff;">LUSA ADMIN</h2>
        <form method="POST">
            <input type="text" name="user" placeholder="Usuário" required>
            <input type="password" name="pass" placeholder="Senha" required>
            <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">ENTRAR</button>
        </form>
    </div>
</body>
</html>
