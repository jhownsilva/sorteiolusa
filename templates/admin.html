<div class="admin-box">
    <h3>➕ Cadastrar Novo Jogador</h3>
    <form action="/api/cadastrar" method="POST">
        <input type="text" name="nome" placeholder="Nome do Jogador" required>
        <select name="posicao">
            <option value="goleiro">Goleiro</option>
            <option value="zagueiro">Zagueiro</option>
            <option value="lateral">Lateral</option>
            <option value="volante">Volante</option>
            <option value="meia">Meia</option>
            <option value="atacante">Atacante</option>
            <option value="centroavante">Centroavante</option>
        </select>
        <input type="number" name="fixo" placeholder="Nº Camisa (Opcional)">
        <button type="submit">CADASTRAR</button>
    </form>
</div>

<hr>

<h3>📋 Gestão de Elenco</h3>
<table>
    {% for j in jogadores %}
    <tr>
        <td>{{ j.nome }}</td>
        <td>
            <form action="/api/alterar_posicao" method="POST" style="display:inline;">
                <input type="hidden" name="nome" value="{{ j.nome }}">
                <select name="nova_posicao" onchange="this.form.submit()">
                    <option value="{{ j.posicao }}">Atual: {{ j.posicao }}</option>
                    <option value="goleiro">Goleiro</option>
                    <option value="zagueiro">Zagueiro</option>
                    <option value="lateral">Lateral</option>
                    <option value="volante">Volante</option>
                    <option value="meia">Meia</option>
                    <option value="atacante">Atacante</option>
                    <option value="centroavante">Centroavante</option>
                </select>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
