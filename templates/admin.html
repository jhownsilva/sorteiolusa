<div class="admin-actions" style="margin: 20px; text-align: center;">
    <button onclick="abrirModalCadastro()" class="btn" style="background: #28a745;">➕ Novo Jogador</button>
</div>

<table class="table-admin">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Posição</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for j in jogadores %}
        <tr>
            <td>{{ j.nome }}</td>
            <td>{{ j.posicao }}</td>
            <td>
                <button onclick="excluirJogador('{{ j.nome }}')" class="btn" style="background: #dc3545; padding: 5px 10px;">❌ Excluir</button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script>
function excluirJogador(nome) {
    if(confirm("Deseja realmente remover " + nome + "?")) {
        // Aqui você fará o fetch para uma rota Python de delete
        alert("Jogador removido do banco!");
    }
}
</script>
