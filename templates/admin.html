<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lusa Admin - Gestão</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .admin-container { max-width: 900px; margin: 40px auto; padding: 20px; background: #1a1a1a; border-radius: 15px; }
        .form-add { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #333; }
        .btn-excluir { background: none; border: none; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h2>⚙️ Gestão Lusa F.C.</h2>
        <form class="form-add" action="/api/cadastrar" method="POST">
            <input type="text" name="nome" placeholder="Nome" required>
            <select name="posicao">
                <option value="goleiro">Goleiro</option>
                <option value="zagueiro">Zagueiro</option>
                <option value="lateral">Lateral</option>
                <option value="volante">Volante</option>
                <option value="meia">Meia</option>
                <option value="atacante">Atacante</option>
                <option value="centroavante">Centroavante</option>
            </select>
            <input type="number" name="fixo" placeholder="Nº">
            <button type="submit" class="btn-sortear" style="padding: 10px 20px;">➕ Adicionar</button>
        </form>

        <table>
            <thead><tr><th>Jogador</th><th>Posição</th><th>Status</th><th>Excluir</th></tr></thead>
            <tbody>
                {% for j in jogadores %}
                <tr>
                    <td>{{ j.nome }}</td>
                    <td>{{ j.posicao.upper() }}</td>
                    <td>
                        <form action="/api/alterar_status" method="POST">
                            <input type="hidden" name="nome" value="{{ j.nome }}">
                            <select name="novo_status" onchange="this.form.submit()" style="background: #333; color: white;">
                                <option value="ativo" {% if j.status == 'ativo' %}selected{% endif %}>Ativo</option>
                                <option value="dm" {% if j.status == 'dm' %}selected{% endif %}>🚑 D.M</option>
                                <option value="suspenso" {% if j.status == 'suspenso' %}selected{% endif %}>🚫 Suspenso</option>
                            </select>
                        </form>
                    </td>
                    <td>
                        <form action="/api/excluir" method="POST" onsubmit="return confirm('Apagar {{ j.nome }}?')">
                            <input type="hidden" name="nome" value="{{ j.nome }}">
                            <button type="submit" class="btn-excluir">🗑️</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <br><a href="/" style="color: #007bff;">⬅️ Voltar ao Sorteio</a>
    </div>
</body>
</html>
